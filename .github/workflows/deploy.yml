name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          # Inject your server URL at build time so the frontend knows where
          # to send push notification triggers. Set this in GitHub repo Settings
          # → Secrets and variables → Actions → Variables (not Secrets).
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_BEAMS_INSTANCE_ID: ${{ vars.VITE_BEAMS_INSTANCE_ID }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Ensures the service worker and manifest are served from the correct root
          force_orphan: true
