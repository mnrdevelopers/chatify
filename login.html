<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Chatify - Login</title>
    
    <!-- ── Core PWA & iOS Meta Tags ─────────────────────────────────────── -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Home Screen setup -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Chatify" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- App Icons -->
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon.png" />

    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for elegant icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script type="module" crossorigin src="./assets/login-BtumadGz.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/index.esm-DIsPQHip.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-DgayE_hj.js">
    <link rel="stylesheet" crossorigin href="./assets/auth-DHZMF2cQ.css">
  </head>
  <body>
    <!-- App Container -->
    <div id="app-container">
      
      <!-- Loading Screen -->
      <div id="loading-screen" class="screen active" style="align-items: center; justify-content: center; background: #0f172a;">
        <div style="text-align: center;">
          <i class='bx bxs-chat bx-burst' style="font-size: 5rem; color: #10b981;"></i>
          <h2 style="color: white; margin-top: 20px; font-weight: bold; letter-spacing: 2px;">Chatify</h2>
        </div>
      </div>

      <!-- Login Screen -->
      <div id="login-screen" class="screen hidden">
        <div class="login-card auth-card">

          <!-- Logo & App Name -->
          <div class="logo-container">
            <i class='bx bxs-chat bx-tada'></i>
          </div>
          <h1>Chatify</h1>

          <!-- Auth Tabs -->
          <div class="auth-tabs" id="auth-tabs">
            <button class="auth-tab active" data-tab="login" id="tab-btn-login">Sign In</button>
            <button class="auth-tab" data-tab="register" id="tab-btn-register">Register</button>
          </div>

          <!-- Global error/success message -->
          <p id="auth-error-msg" style="display:none; font-size:0.85rem; margin: 0 0 10px; text-align:center;"></p>

          <!-- ── Login Panel ─────────────────────────────────── -->
          <div class="auth-panel active" id="auth-panel-login">

            <div class="input-wrapper auth-input">
              <i class='bx bx-envelope auth-icon'></i>
              <input type="email" id="auth-email" placeholder="Email address" autocomplete="email" />
            </div>

            <div class="input-wrapper auth-input" style="position:relative;">
              <i class='bx bx-lock-alt auth-icon'></i>
              <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
              <button type="button" class="pwd-toggle" id="toggle-login-pwd" title="Show/Hide password">
                <i class='bx bx-show'></i>
              </button>
            </div>

            <div style="text-align:right; margin: -6px 0 10px;">
              <button type="button" id="btn-forgot-password" class="link-btn">Forgot password?</button>
            </div>

            <button id="btn-login-email" class="cta-button">
              <i class='bx bx-log-in'></i> Sign In
            </button>

            <div class="auth-divider"><span>or</span></div>

            <button id="btn-login-google" class="google-btn">
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Continue with Google
            </button>
          </div>

          <!-- ── Register Panel ───────────────────────────────── -->
          <div class="auth-panel" id="auth-panel-register">

            <div class="input-wrapper auth-input">
              <i class='bx bx-user auth-icon'></i>
              <input type="text" id="reg-name" placeholder="Display name" autocomplete="name" />
            </div>

            <div class="input-wrapper auth-input">
              <i class='bx bx-envelope auth-icon'></i>
              <input type="email" id="reg-email" placeholder="Email address" autocomplete="email" />
            </div>

            <div class="input-wrapper auth-input" style="position:relative;">
              <i class='bx bx-lock-alt auth-icon'></i>
              <input type="password" id="reg-password" placeholder="Password (min. 6 chars)" autocomplete="new-password" />
              <button type="button" class="pwd-toggle" id="toggle-reg-pwd" title="Show/Hide password">
                <i class='bx bx-show'></i>
              </button>
            </div>

            <div class="input-wrapper auth-input">
              <i class='bx bx-lock-open-alt auth-icon'></i>
              <input type="password" id="reg-confirm" placeholder="Confirm password" autocomplete="new-password" />
            </div>

            <button id="btn-register" class="cta-button" style="margin-top:6px;">
              <i class='bx bx-user-plus'></i> Create Account
            </button>

            <div class="auth-divider"><span>or</span></div>

            <button id="btn-login-google-reg" class="google-btn">
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Continue with Google
            </button>
          </div>

        </div>
      </div>
    </div>
    
  </body>
</html>
